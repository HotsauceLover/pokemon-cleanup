<!DOCTYPE html>
<html>
<body style="background:#001628;color:#f4fbfd;font-family:sans-serif;padding:20px">

<h2>🧹 V1 Basic</h2>

<p>Copy → paste → clean → done</p>

<textarea style="width:100%;height:120px">
!shiny&!legendary&!mythical&!favorite
</textarea>

<br><br>

<button onclick="copyText()">Copy</button>

<script>
function copyText() {
  const text = document.querySelector("textarea").value;
  navigator.clipboard.writeText(text);
  alert("Copied!");
}
</script>

</body>
</html>
