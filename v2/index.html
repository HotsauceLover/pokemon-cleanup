<!DOCTYPE html>
<html>
<body style="background:#001628;color:#f4fbfd;font-family:sans-serif;padding:20px">

<h2>⚙️ V2 Intermediate</h2>

<p>Select your mode:</p>

<button onclick="setMode('safe')">Safe</button>
<button onclick="setMode('balanced')">Balanced</button>
<button onclick="setMode('aggressive')">Aggressive</button>

<br><br>

<textarea id="output" style="width:100%;height:120px"></textarea>

<script>
function setMode(mode){
  let text = "";

  if(mode === "safe"){
    text = "!shiny&!legendary&!mythical&!favorite";
  }
  if(mode === "balanced"){
    text = "!shiny&!legendary&!mythical";
  }
  if(mode === "aggressive"){
    text = "!shiny";
  }

  document.getElementById("output").value = text;
}
</script>

</body>
</html>
